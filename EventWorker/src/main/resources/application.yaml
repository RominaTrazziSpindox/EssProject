spring:
  application:
    name: event-worker
  sql:
    init:
      mode: never

  RabbitMQ:
    host: localhost
    port: 5672
    username: guest
    password: guest

    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000

  datasource:
    url: jdbc:postgresql://localhost:5432/ess_data
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  rabbit:
    queue: crm.campaign.queue
    exchange: crm.exchange
    routing-key: crm.campaign.created
    dlq: crm.campaigns.dlq
    dlx: crm.dlx

server:
  port: 8081